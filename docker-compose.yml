name: consuma

# Shared env for the app services — mirrors core/config.py defaults (spec §10).
# Inside the compose network, services resolve each other by service name (not localhost).
x-app-env: &app-env
  DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/consuma
  RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
  REDIS_URL: redis://redis:6379/0
  MINIO_ENDPOINT: minio:9000
  MINIO_ACCESS: minioadmin
  MINIO_SECRET: minioadmin

services:
  # --- Backing infrastructure (single instances) ------------------------------
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: consuma
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d consuma"]
      interval: 5s
      timeout: 3s
      retries: 12

  rabbitmq:
    image: rabbitmq:4-management   # management UI at http://localhost:15672 (guest/guest)
    environment:
      # Fixed cookie avoids the .erlang.cookie eacces error on Windows Docker Desktop.
      RABBITMQ_ERLANG_COOKIE: "consuma-secret-cookie"
    ports: ["5672:5672", "15672:15672"]
    volumes: ["rmqdata:/var/lib/rabbitmq"]
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"   # console at http://localhost:9001
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports: ["9000:9000", "9001:9001"]
    volumes: ["miniodata:/data"]
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 12

  # --- Application services (the only ones you scale) -------------------------
  gateway:
    build:
      context: .
      dockerfile: services/gateway/Dockerfile
    environment: *app-env
    ports: ["8000:8000"]
    depends_on:
      postgres: {condition: service_healthy}
      rabbitmq: {condition: service_healthy}
      redis: {condition: service_healthy}
      minio: {condition: service_healthy}

  worker:
    build:
      context: .
      dockerfile: services/worker/Dockerfile
    environment: *app-env
    # Scale workers to exercise the global Redis semaphore: docker compose up --scale worker=4
    depends_on:
      postgres: {condition: service_healthy}
      rabbitmq: {condition: service_healthy}
      redis: {condition: service_healthy}
      minio: {condition: service_healthy}

volumes:
  pgdata:
  rmqdata:
  miniodata:
